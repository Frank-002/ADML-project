# W&B sweep search space for DINOV2, auto-selected by train.py when
# launching `train.py DINOV2` (override with --sweep-config).
# Never swept on large yet: values inherited from dinov3.yaml (the lr
# scaling argument depends on the dataset size, not on the model) —
# refine after the first DINOV2 sweep on large.
method: bayes
metric:
  name: val/pck_0.10
  goal: maximize
parameters:
  # Constant for every run: SPair split the search runs on (the final
  # training after the sweep always uses large)
  dataset_size:
    value: small
  lr:
    distribution: log_uniform_values
    min: 1.0e-6  # keep the "2.0" form: PyYAML parses bare 2e-6 as a string
    max: 1.0e-4
  tau:
    values: [0.02, 0.05, 0.1, 0.2]
  effective_batch:
    values: [16, 32, 64]
early_terminate:
  type: hyperband
  min_iter: 2
  eta: 3
