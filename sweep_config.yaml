# W&B sweep search space (hyperparameter search on SPair small).
# Standard wandb sweep format; the sweep name is set by train.py from --model.
method: bayes
metric:
  name: val/pck_0.10
  goal: maximize
parameters:
  # lr cap at 1e-4: above that a fine-tune wrecks the pretrained
  # features in a few epochs and the run just burns sweep budget
  lr:
    distribution: log_uniform_values
    min: 1.0e-6  # keep the "1.0" form: PyYAML parses bare 1e-6 as a string
    max: 1.0e-4
  tau:
    values: [0.02, 0.05, 0.1, 0.2]
  # Effective batch (real batch x grad accum): the per-forward batch
  # is fixed by MAX_REAL_BATCH, so memory use does not depend on this
  effective_batch:
    values: [16, 32, 64, 128]
# Hyperband pruning: at epochs 2, 6, 18 (min_iter * eta^k) runs whose
# val/pck_0.10 is in the bottom tier vs their peers get terminated
early_terminate:
  type: hyperband
  min_iter: 2  # TODO: alzare a 3
  eta: 3
